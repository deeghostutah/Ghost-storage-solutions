<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start Your Project | Ghost Storage Solutions</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<nav class="navbar">
  <a href="index.html" class="logo">
    <img src="assets/images/ghost-logo-transparent.png" alt="Ghost Storage Solutions" class="nav-logo">
  </a>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Start Your Project</a></li>
  </ul>
</nav>

<header class="contact-hero">
  <p class="eyebrow">Start Your Project</p>
  <h1>Let’s Design Something Beautiful Together.</h1>
  <p>Tell us about your space, your goals, and what kind of storage solution you’re dreaming about.</p>
</header>

<section class="project-form-section">

  <form
    class="project-form"

    <h2>Project Request</h2>

    <div class="form-grid">
<input name="fullname" type="text" placeholder="Full Name" required>

<input name="phone" type="tel" placeholder="Phone Number" required>

<input name="email" type="email" placeholder="Email Address" required>

<input name="address" type="text" placeholder="Address / City" required>

    </div>

    <select name="projectType" required>
      <option value="">Project Type</option>
      <option>Kitchen</option>
      <option>Pantry</option>
      <option>Closet</option>
      <option>Office</option>
      <option>Bedroom</option>
      <option>Bathroom</option>
      <option>Garage</option>
      <option>Laundry / Mudroom</option>
      <option>Toy Room</option>
      <option>Other</option>
    </select>

    <select name="budget" required>
      <option value="">Budget Range</option>
      <option>Under $1,000</option>
      <option>$1,000 - $2,500</option>
      <option>$2,500 - $5,000</option>
      <option>$5,000 - $10,000</option>
      <option>$10,000+</option>
    </select>

    <select name="timeline" required>
      <option value="">Timeline</option>
      <option>ASAP</option>
      <option>Within 30 days</option>
      <option>1-3 months</option>
      <option>Just exploring ideas</option>
    </select>

    <textarea name="message" placeholder="Tell us about your project"></textarea>

    <button type="submit" class="button">Start My Project</button>

  </form>
  <iframe name="hidden_iframe" style="display:none;"></iframe>

</section>

<footer>
  <h3>Ghost Storage Solutions</h3>
  <p>Designed to Disappear.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
